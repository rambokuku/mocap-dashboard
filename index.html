<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光子动捕管理协作</title>
<style>
@font-face{font-family:'TencentSans';src:local('TencentSans W7'),local('TencentSans-W7');font-weight:700;font-display:swap}
:root{--pri:#0066CC;--acc:#00A3E0;--acc2:#00D4FF;--ok:#00C48C;--warn:#FF8C00;--err:#FF4757;--pur:#6C5CE7;--bg:#060A14;--bgc:rgba(12,18,35,0.88);--txt:#EAEEF6;--txt2:#8892A8;--txt3:#505A70;--bdr:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.03);--r-lg:24px;--r-xl:32px;--sh-md:0 8px 32px rgba(0,0,0,0.5);--tr:all .4s cubic-bezier(.25,.46,.45,.94);--tr2:all .5s cubic-bezier(.34,1.56,.64,1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'TencentSans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;min-height:100vh;overflow-x:hidden;font-weight:700}
/* === Mocap Photo Background Slideshow === */
.photo-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.photo-bg-img{position:absolute;inset:-20px;background-size:cover;background-position:center;opacity:0;transition:opacity 3s ease-in-out;filter:saturate(.3) brightness(.18) contrast(1.1) hue-rotate(-10deg);animation:kenBurns 30s ease-in-out infinite alternate}
.photo-bg-img.active{opacity:1}
@keyframes kenBurns{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.08) translate(-10px,-5px)}}
.photo-bg-overlay{position:absolute;inset:0;background:
  radial-gradient(ellipse at 20% 20%, rgba(108,92,231,.18) 0%, transparent 50%),
  radial-gradient(ellipse at 80% 80%, rgba(0,102,204,.15) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 50%, rgba(6,10,20,.4) 0%, rgba(6,10,20,.75) 100%),
  linear-gradient(180deg, rgba(6,10,20,.6) 0%, rgba(6,10,20,.3) 30%, rgba(6,10,20,.3) 70%, rgba(6,10,20,.7) 100%);
  pointer-events:none}
.photo-bg-vignette{position:absolute;inset:0;box-shadow:inset 0 0 200px 60px rgba(6,10,20,.9);pointer-events:none}
/* === Particle Canvas === */
#particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
/* === Enhanced Ambient Orbs === */
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(120px);animation:of 25s ease-in-out infinite}
.orb:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,rgba(0,102,204,.12),transparent 70%);top:-15%;right:-10%}
.orb:nth-child(2){width:600px;height:600px;background:radial-gradient(circle,rgba(108,92,231,.10),transparent 70%);bottom:-15%;left:-5%;animation-delay:-8s}
.orb:nth-child(3){width:500px;height:500px;background:radial-gradient(circle,rgba(0,163,224,.07),transparent 70%);top:40%;left:30%;animation-delay:-16s}
.orb:nth-child(4){width:350px;height:350px;background:radial-gradient(circle,rgba(168,85,247,.06),transparent 70%);top:60%;right:20%;animation-delay:-12s}
@keyframes of{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-30px) scale(1.08)}50%{transform:translate(-30px,40px) scale(.92)}75%{transform:translate(20px,20px) scale(1.04)}}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.008) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.008) 1px,transparent 1px);background-size:60px 60px}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.hd{background:rgba(6,10,20,.65);padding:0 48px;display:flex;align-items:center;height:72px;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:100;backdrop-filter:saturate(180%) blur(30px);box-shadow:0 4px 30px rgba(0,0,0,.3)}

.hd-c{max-width:1400px;margin:0 auto;width:100%;display:flex;justify-content:space-between;align-items:center;min-height:72px}
.hd-l{display:flex;align-items:center;gap:16px}
.hd-logo{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0055B0,#00A3E0);box-shadow:0 4px 20px rgba(0,102,204,.4),inset 0 1px 0 rgba(255,255,255,.2);position:relative}
.hd-logo::before{content:'';position:absolute;inset:-3px;border-radius:17px;background:linear-gradient(135deg,rgba(0,102,204,.5),rgba(0,163,224,.3));z-index:-1;filter:blur(10px)}
.hd h1{font-size:18px;background:linear-gradient(90deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-r{display:flex;align-items:flex-start;gap:14px;font-size:13px;color:var(--txt2)}
.hd-info-row{display:flex;align-items:center;gap:14px}
.team-info-float{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;padding:0 0 8px;margin-top:-36px;color:var(--txt2);font-size:11px}
.hd-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(0,102,204,.12);border:1px solid rgba(0,102,204,.2);color:var(--acc2);border-radius:20px;font-size:12px}
.hd-tag svg{width:12px;height:12px}
.ubadge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:var(--tr)}
.ubadge.superadmin{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);color:#FFD700}
.ubadge.admin{background:rgba(0,196,140,.1);border:1px solid rgba(0,196,140,.2);color:#00E6A0}
.ubadge.editor{background:rgba(0,163,224,.1);border:1px solid rgba(0,163,224,.2);color:var(--acc2)}
.ubadge.viewer{background:rgba(136,146,168,.1);border:1px solid rgba(136,146,168,.2);color:var(--txt2)}
.ct{max-width:1400px;margin:0 auto;padding:48px;position:relative;z-index:2;overflow:visible}
.hero{margin-bottom:56px;text-align:center;position:relative;padding:20px 0}.hero::before{content:'';position:absolute;inset:-40px -80px;background:url('images/mocap_studio2.jpg') center/cover no-repeat;filter:saturate(.15) brightness(.12) blur(3px) hue-rotate(-15deg);border-radius:40px;opacity:.6;z-index:-2;mask-image:radial-gradient(ellipse 70% 80% at center,rgba(0,0,0,.7) 0%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 70% 80% at center,rgba(0,0,0,.7) 0%,transparent 100%)}.hero h2{font-size:47px;margin-bottom:16px;opacity:0;animation:heroTitleIn 1.2s cubic-bezier(.25,.46,.45,.94) .3s forwards;position:relative;display:inline-block}
.hero h2 span{background:linear-gradient(135deg,#00A3E0,#0066CC,#6C5CE7,#00A3E0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:300% 300%;animation:gs 8s ease-in-out infinite}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes heroTitleIn{0%{opacity:0;transform:scale(.7);filter:blur(20px) drop-shadow(0 0 0 transparent)}60%{opacity:1;transform:scale(1.05);filter:blur(0) drop-shadow(0 0 40px rgba(0,102,204,.6))}100%{opacity:1;transform:scale(1);filter:blur(0) drop-shadow(0 0 20px rgba(0,102,204,.2))}}
.hero h2::before{content:'';position:absolute;inset:-30px -60px;background:radial-gradient(ellipse at center,rgba(0,102,204,.2),rgba(108,92,231,.08) 50%,transparent 75%);border-radius:50%;z-index:-1;opacity:0;animation:heroGlow 1.5s ease .3s forwards}
@keyframes heroGlow{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.1)}100%{opacity:.7;transform:scale(1)}}
.hero p{font-size:15px;color:var(--txt2);opacity:0;animation:fu .7s ease .8s forwards}.hero-line{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:200px;height:3px;background:linear-gradient(90deg,transparent,var(--pri),var(--acc),var(--pur),transparent);border-radius:2px;opacity:0;animation:heroLineIn 1s ease 1s forwards}
@keyframes heroLineIn{0%{opacity:0;width:0}100%{opacity:1;width:200px}}
/* === Timeline Arrow Animation === */
.timeline-arrow{position:absolute;top:50%;left:0;right:0;height:48px;z-index:0;pointer-events:none;overflow:visible;margin-top:-24px}
.timeline-arrow-line{position:absolute;top:0;left:0;height:100%;width:0;border-radius:24px;transition:none}
.timeline-arrow-head{position:absolute;top:50%;width:24px;height:28px;opacity:0;transform:translateY(-50%);transition:none}
.timeline-arrow-head::before,.timeline-arrow-head::after{content:'';position:absolute;width:16px;height:3px;border-radius:2px;right:0}
.timeline-arrow-head::before{top:6px;transform:rotate(30deg);transform-origin:right center}
.timeline-arrow-head::after{bottom:6px;transform:rotate(-30deg);transform-origin:right center}
.ta-hw .timeline-arrow-line{background:linear-gradient(90deg,rgba(0,102,204,.06),rgba(0,163,224,.12),rgba(0,102,204,.06));border:1px solid rgba(0,163,224,.15);backdrop-filter:blur(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.05)}
.ta-hw .timeline-arrow-head::before,.ta-hw .timeline-arrow-head::after{background:rgba(0,163,224,.5)}
.ta-sw .timeline-arrow-line{background:linear-gradient(90deg,rgba(108,92,231,.06),rgba(168,85,247,.12),rgba(108,92,231,.06));border:1px solid rgba(168,85,247,.15);backdrop-filter:blur(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.05)}
.ta-sw .timeline-arrow-head::before,.ta-sw .timeline-arrow-head::after{background:rgba(168,85,247,.5)}
.ta-op .timeline-arrow-line{background:linear-gradient(90deg,rgba(255,140,0,.06),rgba(255,179,64,.12),rgba(255,140,0,.06));border:1px solid rgba(255,179,64,.15);backdrop-filter:blur(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.05)}
.ta-op .timeline-arrow-head::before,.ta-op .timeline-arrow-head::after{background:rgba(255,179,64,.5)}
/* === Photo Divider Strip === */
.photo-divider{position:relative;height:120px;margin:24px 0 48px;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.photo-divider-img{position:absolute;inset:0;background-size:cover;background-position:center 40%;filter:saturate(.2) brightness(.2) hue-rotate(-10deg);transition:transform 8s ease}
.photo-divider:hover .photo-divider-img{transform:scale(1.05)}
.photo-divider-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,10,20,.85) 0%,rgba(6,10,20,.4) 30%,rgba(6,10,20,.4) 70%,rgba(6,10,20,.85) 100%)}
.photo-divider-text{position:absolute;bottom:20px;left:32px;font-size:13px;color:rgba(255,255,255,.35);letter-spacing:3px;text-transform:uppercase;z-index:1}
.photo-divider-text span{color:rgba(255,255,255,.55);font-weight:700}
/* Card sequential reveal */
.sc.card-reveal{opacity:0;transform:translateY(60px) scale(.8)}
.sc.card-revealed{opacity:1;transform:translateY(0) scale(1);transition:opacity 1.2s cubic-bezier(.25,.46,.45,.94),transform 1.4s cubic-bezier(.34,1.56,.64,1)}
.sg{display:grid;gap:28px;margin-bottom:64px;position:relative}
.sc{position:relative;z-index:1;background:rgba(12,18,35,0.75);border-radius:var(--r-xl);padding:36px 32px 32px;cursor:pointer;transition:var(--tr);border:1px solid rgba(255,255,255,.08);overflow:hidden;backdrop-filter:blur(30px) saturate(150%)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.hw::before{background:linear-gradient(90deg,#0066CC,#00A3E0,transparent)}
.sc.sw::before{background:linear-gradient(90deg,#6C5CE7,#A855F7,transparent)}
.sc.op::before{background:linear-gradient(90deg,#FF8C00,#FFB340,transparent)}
.sc::after{content:'';position:absolute;inset:0;border-radius:var(--r-xl);opacity:0;transition:var(--tr)}
.sc.hw::after{background:radial-gradient(ellipse at top left,rgba(0,102,204,.1),transparent 60%)}
.sc.sw::after{background:radial-gradient(ellipse at top left,rgba(108,92,231,.1),transparent 60%)}
.sc.op::after{background:radial-gradient(ellipse at top left,rgba(255,140,0,.1),transparent 60%)}
.sc:hover{transform:translateY(-8px)}.sc.card-revealed:hover{transform:translateY(-8px) scale(1)}.sc:hover::after{opacity:1}
.sc.hw:hover{box-shadow:0 0 80px rgba(0,102,204,.15),0 20px 60px rgba(0,0,0,.3);border-color:rgba(0,102,204,.35)}
.sc.sw:hover{box-shadow:0 0 80px rgba(108,92,231,.15),0 20px 60px rgba(0,0,0,.3);border-color:rgba(108,92,231,.35)}
.sc.op:hover{box-shadow:0 0 80px rgba(255,140,0,.15),0 20px 60px rgba(0,0,0,.3);border-color:rgba(255,140,0,.35)}
.sc-in{position:relative;z-index:1}.ct-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.i3d{width:60px;height:60px;border-radius:18px;display:flex;align-items:center;justify-content:center;position:relative;transform:perspective(200px) rotateX(5deg) rotateY(-5deg);transition:var(--tr2)}
.i3d::after{content:'';position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%)}
.i3d.hw{background:linear-gradient(145deg,#0077E6,#0055B0);box-shadow:0 8px 24px rgba(0,102,204,.4),inset 0 1px 0 rgba(255,255,255,.25),inset 0 -2px 0 rgba(0,0,0,.15)}
.i3d.sw{background:linear-gradient(145deg,#7C6CF7,#5A4CD6);box-shadow:0 8px 24px rgba(108,92,231,.4),inset 0 1px 0 rgba(255,255,255,.25),inset 0 -2px 0 rgba(0,0,0,.15)}
.i3d.op{background:linear-gradient(145deg,#FF9C1A,#E67A00);box-shadow:0 8px 24px rgba(255,140,0,.4),inset 0 1px 0 rgba(255,255,255,.25),inset 0 -2px 0 rgba(0,0,0,.15)}
.sc:hover .i3d{transform:perspective(200px) rotateX(0) rotateY(0) scale(1.05)}
.i3d .ie{width:32px;height:32px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}.i3d .ie svg{width:100%;height:100%}
.sub-ic{display:inline-flex;width:14px;height:14px;vertical-align:middle;margin-right:2px;opacity:.8;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}.sub-ic svg{width:100%;height:100%}
.ca{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;transition:var(--tr2)}
.sc:hover .ca{transform:translateX(6px);background:rgba(0,102,204,.1);border-color:rgba(0,102,204,.25)}
.ca svg{width:14px;height:14px;color:var(--txt3);transition:var(--tr)}.sc:hover .ca svg{color:var(--acc2)}
.ct-t{font-size:28px;margin-bottom:8px}.ct-s{font-size:15px;color:var(--txt2);margin-bottom:28px}
.ct-b{display:flex;align-items:center;justify-content:space-between}
.st{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:12px;border:1px solid transparent}
.st-c{background:rgba(0,196,140,.1);color:#00E6A0;border-color:rgba(0,196,140,.15)}
.st-i{background:rgba(255,140,0,.1);color:#FFB340;border-color:rgba(255,140,0,.15)}
.st-p{background:rgba(108,92,231,.1);color:#A29BFE;border-color:rgba(108,92,231,.15)}
.sd{width:7px;height:7px;border-radius:50%}
.st-c .sd{background:var(--ok);box-shadow:0 0 10px rgba(0,196,140,.6)}
.st-i .sd{background:var(--warn);animation:pd 2s infinite;box-shadow:0 0 10px rgba(255,140,0,.6)}
.st-p .sd{background:var(--pur)}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.pm{width:165px;height:165px;position:relative}.pm svg{width:165px;height:165px;transform:rotate(-90deg)}
.pm .pt{fill:none;stroke:rgba(255,255,255,.04);stroke-width:2.5}
.pm .pv{fill:none;stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset 1.8s cubic-bezier(.4,0,.2,1)}
.pm .pp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pm .pp .pn{font-size:36px;line-height:1}.pm .pp .pl2{font-size:12px;color:var(--txt2);margin-top:4px}
.gs{background:rgba(12,18,35,0.72);border-radius:var(--r-xl);padding:36px;box-shadow:var(--sh-md);margin-bottom:64px;overflow-x:auto;border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(30px) saturate(150%);position:relative}
.gs::before{content:'';position:absolute;top:-1px;left:60px;right:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,102,204,.3),transparent)}
.gs-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.gs-ta h3{font-size:25px;display:flex;align-items:center;gap:10px}.gs-ta p{font-size:14px;color:var(--txt2);margin-top:4px}
.gl{display:flex;gap:20px}.gli{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt2)}
.gld{width:12px;height:12px;border-radius:4px}
.gld.c{background:linear-gradient(135deg,#00C48C,#00E6A0);box-shadow:0 0 10px rgba(0,196,140,.4)}
.gld.i{background:linear-gradient(135deg,#FF8C00,#FFB340);box-shadow:0 0 10px rgba(255,140,0,.4)}
.gld.p{background:transparent;border:2px dashed var(--txt3)}
.gc{min-width:800px}.gth{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:8px}
.gm{flex:1;min-width:80px;text-align:center;font-size:13px;color:var(--txt2);padding:12px 0;position:relative}
.gm::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:1px;height:16px;background:var(--bdr)}
/* 折叠按钮：悬停月份时显示 */
.gm-fold-btn{display:none;position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);font-size:10px;color:var(--acc2);cursor:pointer;padding:2px 8px;border-radius:8px;background:rgba(0,102,204,.08);border:1px solid rgba(0,102,204,.25);white-space:nowrap;z-index:3;transition:all .3s;animation:ganttFoldGlow 2s ease-in-out infinite}
.gm:hover .gm-fold-btn{display:block}
.gm-fold-btn:hover{background:rgba(0,102,204,.18);border-color:var(--acc2);box-shadow:0 0 14px rgba(0,102,204,.4);transform:translateX(-50%) scale(1.05)}
@keyframes ganttFoldGlow{0%,100%{box-shadow:0 0 4px rgba(0,102,204,.2),0 0 8px rgba(0,102,204,.1)}50%{box-shadow:0 0 10px rgba(0,102,204,.45),0 0 20px rgba(0,102,204,.2)}}
/* 折叠提示条 */
.gm-fold-hint{display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:rgba(0,102,204,.04);border:1px solid rgba(0,102,204,.15);border-radius:10px;padding:8px 20px;margin:0 0 8px 280px;transition:all .3s;font-size:12px;color:var(--txt3);position:sticky;left:280px;z-index:1}
.gm-fold-hint:hover{background:rgba(0,102,204,.1);border-color:var(--acc2)}
.gm-fold-icon{color:var(--acc2);animation:ganttFoldPulse 1.5s ease-in-out infinite}
.gm-unfold-btn{color:var(--acc2);font-weight:700;background:rgba(0,102,204,.1);padding:3px 10px;border-radius:6px;transition:all .2s;margin-left:4px}
.gm-unfold-btn:hover{background:rgba(0,102,204,.2)}
@keyframes ganttFoldPulse{0%,100%{opacity:.5}50%{opacity:1}}
.gwm{display:flex;margin-bottom:24px}.gwg{flex:1;min-width:80px;display:flex;justify-content:space-around}.gwl{font-size:10px;color:var(--txt3)}
/* 甘特图头部 sticky 占位 */
.gth-pad,.gwm-pad{width:280px;flex-shrink:0;position:sticky;left:0;z-index:2;background:rgba(12,18,35,.92);backdrop-filter:blur(10px)}
.gcl{font-size:22px;text-transform:uppercase;letter-spacing:1.5px;padding:12px 0 16px;display:flex;align-items:center;gap:10px;position:sticky;left:0;z-index:2}
.gcl .cd{width:10px;height:10px;border-radius:3px}
.gcl.hw{color:var(--acc2)}.gcl.hw .cd{background:var(--pri);box-shadow:0 0 8px rgba(0,102,204,.5)}
.gcl.sw{color:#A29BFE}.gcl.sw .cd{background:var(--pur);box-shadow:0 0 8px rgba(108,92,231,.5)}
.gcl.op{color:#FFB340}.gcl.op .cd{background:var(--warn);box-shadow:0 0 8px rgba(255,140,0,.5)}
.gr{display:flex;align-items:stretch;margin-bottom:14px;transition:var(--tr);padding:4px 0;border-radius:8px}.gr:hover{background:rgba(255,255,255,.02)}
.grl{width:280px;font-size:22px;padding-right:20px;padding-left:16px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;position:sticky;left:0;z-index:2;background:rgba(12,18,35,.92);backdrop-filter:blur(10px)}.grl .sl{display:block;font-size:14px;color:var(--txt3);margin-top:4px}

.milestone-scurve{position:relative;padding:40px 20px 20px;min-height:400px}

.ms-dot.p{background:rgba(80,90,112,.6);border:2px dashed var(--txt3)}

.ms-node{opacity:0;transform:translateY(30px)}
.ms-node.ms-visible{animation:msNodeIn .6s cubic-bezier(.25,.46,.45,.94) forwards}

/* Path draw animation */
.ms-path-line{stroke-dasharray:99999;stroke-dashoffset:99999;animation:msPathDraw 3s cubic-bezier(.4,0,.2,1) .5s forwards;will-change:stroke-dashoffset}
@keyframes msPathDraw{to{stroke-dashoffset:0}}
/* S-curve arrow markers */

@keyframes msArrowIn{to{opacity:1}}

draw(){const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);g.addColorStop(0,this.color+this.alpha+')');g.addColorStop(0.5,this.color+(this.alpha*0.4)+')');g.addColorStop(1,this.color+'0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill()}
}
class Particle{
constructor(){this.reset()}
reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*2.5+0.3;this.vx=(Math.random()-0.5)*0.25;this.vy=(Math.random()-0.5)*0.15-0.03;this.alpha=Math.random()*0.5+0.1;this.alphaDir=Math.random()*0.003+0.001;this.color=COLORS[Math.floor(Math.random()*COLORS.length)];this.life=Math.random()*500+200;this.maxLife=this.life;this.glow=Math.random()>0.6}

/* ===== IOA Authentication Flow ===== */
let IOA_CUR_ID=null; /* Current IOA authenticated user ID */
async function startIOAAuth(){
const savedIOA=localStorage.getItem('mocap_ioa_id');
const loginForm=document.getElementById('ioaLoginForm');
const ioaResult=document.getElementById('ioaResult');
if(savedIOA){
const hash=await sha256(savedIOA);_hashCache[savedIOA]=hash;
if(IOA_USERS_HASH[hash]){
const info=decryptUser(IOA_USERS_HASH[hash],savedIOA);
if(info){RESOLVED_USER={...info,_uid:savedIOA};IOA_CUR_ID=savedIOA;loginForm.style.display='none';ioaResult.style.display='block';showIOAResult();if(savedIOA==='rambokou'){setTimeout(()=>ioaLogin(),600)}return}}}
loginForm.style.display='block';ioaResult.style.display='none';
setTimeout(()=>{const inp=document.getElementById('loginNameInput');if(inp)inp.focus()},300);
}
async function doNameLogin(){
const inp=document.getElementById('loginNameInput');
const errEl=document.getElementById('loginError');
const loginForm=document.getElementById('ioaLoginForm');
const ioaResult=document.getElementById('ioaResult');
const name=inp.value.trim().toLowerCase();
if(!name){errEl.style.display='block';errEl.textContent='请输入您的企业微信英文名';inp.focus();return}
const hash=await sha256(name);_hashCache[name]=hash;
if(!IOA_USERS_HASH[hash]){
errEl.style.display='block';
errEl.innerHTML='<span style="color:#FF4757">✕</span> 未在企业微信通讯录中找到「'+inp.value.trim()+'」<br>请确认您输入的是正确的企业微信英文名（如 rambokou）';
inp.select();return}
const info=decryptUser(IOA_USERS_HASH[hash],name);
if(!info){errEl.style.display='block';errEl.textContent='验证失败，请重试';inp.select();return}
RESOLVED_USER={...info,_uid:name};
errEl.style.display='none';IOA_CUR_ID=name;localStorage.setItem('mocap_ioa_id',name);
loginForm.style.display='none';ioaResult.style.display='block';showIOAResult();
}
function showIOAResult(){
const user=RESOLVED_USER;
if(!user||user._uid!==IOA_CUR_ID)return;
document.getElementById('ioaAvatar').textContent=user.name[0];
document.getElementById('ioaAvatar').style.background=IOA_CUR_ID==='rambokou'?'linear-gradient(135deg,#FFD700,#FF8C00)':'linear-gradient(135deg,#0066CC,#00A3E0)';
document.getElementById('ioaName').textContent=user.name;
document.getElementById('ioaDetail').innerHTML=IOA_CUR_ID+' · '+user.dept+'<br>员工类型：'+user.type;
const actionEl=document.getElementById('ioaAction');
const statusEl=document.getElementById('ioaStatus');
const role=gR(IOA_CUR_ID);
if(role){
/* User has permission — show auto-login */
statusEl.className='ioa-status ok';
statusEl.innerHTML='<span style="color:#00E6A0">●</span> IOA身份认证通过 · 权限：'+RL[role].l;
actionEl.innerHTML='<button class="btn btn-p" style="width:100%;margin-top:8px" onclick="ioaLogin()">进入动捕专项看板</button>'+
'<div style="text-align:center;margin-top:12px"><button style="background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;text-decoration:underline" onclick="switchIOAUser()">切换账号</button></div>';
/* Auto-login handled in startIOAAuth */
}else{
/* Check if there's a pending request */
const pendingReq=AR.find(r=>r.ioaId===IOA_CUR_ID && r.status==='pending');
const rejectedReq=AR.find(r=>r.ioaId===IOA_CUR_ID && r.status==='rejected');
if(pendingReq){
statusEl.className='ioa-status pending';
statusEl.innerHTML='⏳ 权限申请已提交，等待审批中...';
actionEl.innerHTML='<div style="background:rgba(255,140,0,.05);border:1px solid rgba(255,140,0,.12);border-radius:12px;padding:16px;margin-top:12px"><div style="font-size:13px;margin-bottom:8px">申请信息</div><div style="font-size:12px;color:var(--txt2);line-height:1.8">申请权限：'+RL[pendingReq.requestedRole].l+'<br>申请时间：'+pendingReq.date+'<br>申请理由：'+pendingReq.reason+'<br>审批人：寇启龙（超级管理员）</div></div>'+
'<div style="text-align:center;margin-top:16px"><button style="background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;text-decoration:underline" onclick="switchIOAUser()">切换账号</button></div>';
}else if(rejectedReq){
statusEl.className='ioa-status denied';
statusEl.innerHTML='<span style="color:#FF4757">●</span> 上次权限申请未通过';
showAccessRequestForm(actionEl,rejectedReq.rejectReason);
}else{
statusEl.className='ioa-status pending';
statusEl.innerHTML='<span style="color:#FFB340">●</span> 您暂无访问权限';
showAccessRequestForm(actionEl);
}
}
}
function showAccessRequestForm(actionEl,rejectReason){
let h='';
if(rejectReason){h+=`<div style="background:rgba(255,71,87,.05);border:1px solid rgba(255,71,87,.12);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--err);line-height:1.6">拒绝原因：${rejectReason}</div>`}
h+=`<div class="req-form">
<div style="font-size:14px;margin-bottom:16px;color:var(--txt)">申请访问权限</div>
<div class="cg"><label>申请权限级别</label><select id="reqRole" style="width:100%;padding:10px 14px;border:1px solid var(--bdr);border-radius:10px;font-size:13px;font-family:inherit;font-weight:700;background:rgba(255,255,255,.03);color:var(--txt)"><option value="viewer">仅浏览 — 查看看板内容</option><option value="editor">编辑权限 — 可修改看板数据</option></select></div>
<div class="cg"><label>申请理由</label><textarea id="reqReason" placeholder="请说明您需要访问此看板的原因..." style="width:100%;padding:10px 14px;border:1px solid var(--bdr);border-radius:10px;font-size:13px;font-family:inherit;font-weight:700;background:rgba(255,255,255,.03);color:var(--txt);min-height:80px;resize:vertical"></textarea></div>
<button class="btn btn-p" style="width:100%" onclick="submitAccessReq()">提交权限申请</button>
<div style="text-align:center;font-size:11px;color:var(--txt3);margin-top:12px;line-height:1.6">审批人：寇启龙（超级管理员）<br>审批通过后将通过企业微信通知您</div>
</div>
<div style="text-align:center;margin-top:16px"><button style="background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;text-decoration:underline" onclick="switchIOAUser()">切换账号</button></div>`;
actionEl.innerHTML=h;
}
function submitAccessReq(){
const role=document.getElementById('reqRole').value;
const reason=document.getElementById('reqReason').value.trim();
if(!reason){showToast('请填写申请理由',1);return}
const user=RESOLVED_USER;
/* Remove any old rejected request from same user */
AR=AR.filter(r=>!(r.ioaId===IOA_CUR_ID && (r.status==='rejected')));
AR.push({ioaId:IOA_CUR_ID,name:user.name,dept:user.dept,empType:user.type,empId:user.empId,requestedRole:role,reason:reason,date:getBJDate(),status:'pending'});
sReq();showToast('权限申请已提交！等待寇启龙审批');
showIOAResult();
}
function switchIOAUser(){
/* Go back to the name input form */
IOA_CUR_ID=null;
localStorage.removeItem('mocap_ioa_id');
const loginForm=document.getElementById('ioaLoginForm');
const ioaResult=document.getElementById('ioaResult');
loginForm.style.display='block';
ioaResult.style.display='none';
document.getElementById('loginNameInput').value='';
document.getElementById('loginError').style.display='none';
setTimeout(()=>{document.getElementById('loginNameInput').focus()},200);
}
function pickIOAUser(id){doNameLogin()}
async function submitDeviceAuth(){const inp=document.getElementById('deviceAuthInput');const errEl=document.getElementById('deviceAuthError');const code=inp.value.trim();if(!code){errEl.style.display='block';errEl.textContent='请输入设备授权码';inp.focus();return}const ok=await verifyDeviceAuthCode(code);if(ok){errEl.style.display='none';showToast('设备授权成功，正在登录...');await ioaLogin()}else{errEl.style.display='block';errEl.textContent='授权码错误，请重试';inp.value='';inp.focus()}}
async function ioaLogin(){const user=RESOLVED_USER;if(!user||user._uid!==IOA_CUR_ID)return;
const uid=IOA_CUR_ID;
if(!gR(uid)){showToast('您没有访问权限',1);return}
/* Superadmin device binding check */
if(gR(uid)==='superadmin'){const bound=await verifySuperadminDevice(uid);if(!bound){const statusEl=document.getElementById('ioaStatus');if(statusEl){statusEl.className='ioa-status pending';statusEl.innerHTML='<span style="color:#FFB340">●</span> 需要设备授权<br><span style="font-size:12px;font-weight:400;opacity:.7">超级管理员账号需要验证设备授权码</span>'}const actionEl=document.getElementById('ioaAction');if(actionEl){actionEl.innerHTML='<div style="background:rgba(255,140,0,.04);border:1px solid rgba(255,140,0,.15);border-radius:12px;padding:20px;margin-top:12px"><div style="font-size:14px;margin-bottom:12px;color:var(--txt)">输入设备授权码</div><div style="font-size:12px;color:var(--txt2);margin-bottom:16px;line-height:1.6">首次在此设备登录超级管理员账号<br>请输入您的专属授权码完成设备绑定</div><input type="password" id="deviceAuthInput" placeholder="请输入设备授权码" style="width:100%;padding:12px 14px;border:1px solid var(--bdr);border-radius:10px;font-size:14px;font-family:inherit;font-weight:700;background:rgba(255,255,255,.03);color:var(--txt);box-sizing:border-box;margin-bottom:4px" autocomplete="off" onkeydown="if(event.key===\'Enter\')submitDeviceAuth()"><div id="deviceAuthError" style="display:none;font-size:12px;color:var(--err);margin-top:6px;margin-bottom:6px"></div><button class="btn btn-p" style="width:100%;margin-top:10px" onclick="submitDeviceAuth()">验证并绑定此设备</button></div><div style="text-align:center;margin-top:16px"><button style="background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;text-decoration:underline" onclick="switchIOAUser()">切换其他账号</button></div>'}setTimeout(()=>{const inp=document.getElementById('deviceAuthInput');if(inp)inp.focus()},200);return}}
AU.cur=uid;
localStorage.setItem('mocap_cur',uid);
_tryAutoToken();
document.getElementById('loginOv').style.display='none';
uBadge();render();showToast('欢迎回来，'+user.name+'！IOA认证登录成功');
}
function doLogin(){ioaLogin()}
function logout(){AU.cur=null;localStorage.removeItem('mocap_cur');IOA_CUR_ID=null;localStorage.removeItem('mocap_ioa_id');document.getElementById('loginOv').style.display='flex';document.getElementById('ioaLoginForm').style.display='block';document.getElementById('ioaResult').style.display='none';document.getElementById('loginNameInput').value='';document.getElementById('loginError').style.display='none';setTimeout(()=>{document.getElementById('loginNameInput').focus()},300)}

function setGHToken(t){localStorage.setItem('mocap_gh_token',t)}

/* Token 混淆：XOR + Base64，防止明文暴露在 config.json 中 */
const _TK='mocap-dashboard-2026';
function _encToken(t){if(!t)return'';let r='';for(let i=0;i<t.length;i++)r+=String.fromCharCode(t.charCodeAt(i)^_TK.charCodeAt(i%_TK.length));return btoa(r)}
function _decToken(e){if(!e)return'';try{const d=atob(e);let r='';for(let i=0;i<d.length;i++)r+=String.fromCharCode(d.charCodeAt(i)^_TK.charCodeAt(i%_TK.length));return r}catch(x){return''}}

/* 从 GitHub API 获取最新 config.json（公开仓库无需Token即可读取） */
async function ghLoad(){
try{
const headers={'Accept':'application/vnd.github.v3+json'};
const token=getGHToken();if(token)headers['Authorization']=`token ${token}`;
const resp=await fetch(`${GH_API}/repos/${GH_REPO}/contents/${GH_FILE}`,{headers});
if(!resp.ok)return null;
const data=await resp.json();
const content=JSON.parse(decodeURIComponent(escape(atob(data.content))));
return{content,sha:data.sha};
}catch(e){console.warn('GitHub API 加载失败',e);return null}
}

/* 保存数据到 GitHub：更新 config.json */
async function ghSave(jsonData,msg){
const token=getGHToken();if(!token){console.warn('未配置 GitHub Token，仅本地保存');return false}
try{
/* 先获取当前文件的 sha */
const getResp=await fetch(`${GH_API}/repos/${GH_REPO}/contents/${GH_FILE}`,{headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}});
if(!getResp.ok){console.warn('获取文件SHA失败');return false}
const fileInfo=await getResp.json();
const content=btoa(unescape(encodeURIComponent(JSON.stringify(jsonData,null,2))));
const putResp=await fetch(`${GH_API}/repos/${GH_REPO}/contents/${GH_FILE}`,{method:'PUT',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
body:JSON.stringify({message:msg||'chore: 更新业务数据',content:content,sha:fileInfo.sha})});
return putResp.ok;
}catch(e){console.warn('GitHub API 保存失败',e);return false}
}

/* 暂存远程加密Token，登录后根据权限自动下发 */
let _remoteEncToken='';
/* 登录成功后调用：有编辑权限且本地无 Token 时，自动从远程解密下发 */
function _tryAutoToken(){if(_remoteEncToken&&!getGHToken()&&canE()){const t=_decToken(_remoteEncToken);if(t){setGHToken(t);console.log('🔑 已自动获取编辑同步 Token')}}}

/* 构建统一的 config.json 数据格式（包含业务数据+权限+申请队列+版本管理） */
function buildCfgJSON(){
const cfg={project:D.project,modules:D.modules,milestones:D.milestones,auth:{users:AU.users},accessRequests:AR,dataHistory:D.dataHistory||[],dataSnapshots:D.dataSnapshots||{}};
/* 超管保存时，将 Token 加密后写入 auth.ghToken，供有编辑权限的用户自动获取 */
const t=getGHToken();if(t)cfg.auth.ghToken=_encToken(t);
return cfg;
}

/* 从统一 config.json 恢复所有数据 */
function applyCfgJSON(cfg){
if(cfg.project)D.project=cfg.project;
if(cfg.modules)D.modules=cfg.modules;
if(cfg.milestones)D.milestones=cfg.milestones;
if(cfg.auth&&cfg.auth.users){AU.users=cfg.auth.users;sAuth()}
if(cfg.accessRequests){AR=cfg.accessRequests;sReq()}
/* 版本管理数据恢复 */
if(cfg.dataHistory)D.dataHistory=cfg.dataHistory;
/* devHistory 和 platformVersion 始终使用代码内置默认值（由 AI 自动生成，不从远程恢复） */
if(cfg.dataSnapshots)D.dataSnapshots=cfg.dataSnapshots;
/* 暂存远程加密 Token，登录后再根据权限下发 */
if(cfg.auth&&cfg.auth.ghToken)_remoteEncToken=cfg.auth.ghToken;
}

/* 数据加载优先级：GitHub远程 > localStorage > config.json本地文件 > 硬编码默认值 */
let _dataReady=false;

let loaded=false;
/* 1. 尝试从 GitHub API 加载最新数据（需要已配置 token） */
const ghData=await ghLoad();
if(ghData&&ghData.content){
applyCfgJSON(ghData.content);
save();/* 同步到 localStorage */
loaded=true;
console.log('✅ 从 GitHub 远程加载最新数据');
}
/* 2. GitHub 不可用时，回退到 localStorage */
if(!loaded){try{const s=localStorage.getItem('mocap_v5');if(s){D=JSON.parse(s);loaded=true;console.log('📦 从 localStorage 加载数据')}}catch(e){}}
/* 3. 都没有时，从本地 config.json 加载作为初始值 */
if(!loaded){try{const resp=await fetch('config.json?t='+Date.now());if(resp.ok){const cfg=await resp.json();
/* 兼容旧格式 config.json（只有 gantt/milestones，没有 modules） */
if(cfg.modules){applyCfgJSON(cfg)}
else{
if(cfg.gantt&&cfg.gantt.tasks){cfg.gantt.tasks.forEach(task=>{D.modules.forEach(m=>{m.items.forEach(it=>{if(it.ganttLabel===task.label&&task.bars){task.bars.forEach((cb,bi)=>{if(it.ganttBars&&it.ganttBars[bi]){it.ganttBars[bi].start=cb.start||it.ganttBars[bi].start;it.ganttBars[bi].end=cb.end||it.ganttBars[bi].end}})}})})})}
if(cfg.milestones){cfg.milestones.forEach((cm,i)=>{if(D.milestones[i]){D.milestones[i].date=cm.date||D.milestones[i].date}})}
}
if(cfg.project){if(cfg.project.updateDate)D.project.updateDate=cfg.project.updateDate;if(cfg.project.name)D.project.name=cfg.project.name;if(cfg.project.reporter)D.project.reporter=cfg.project.reporter}
}}catch(e){console.warn('config.json 加载失败，使用默认数据',e)}}
_dataReady=true}

/* 保存并同步到 GitHub（异步） */

/* ===== 自动状态计算：根据日期自动推导甘特条状态、模块进度和时间区间 ===== */
/* 计算日期差值（天数），两端都算入 */
function _daysBetween(d1,d2){return Math.round((new Date(d2)-new Date(d1))/864e5);}
function autoCalc(){
const today=new Date().toISOString().slice(0,10);
D.modules.forEach(m=>{
/* ── 遍历二级模块（子项目） ── */
m.items.forEach(it=>{
if(!it.ganttBars||!it.ganttBars.length)return;
let minStart=null,maxEnd=null;
/* ── 三级模块（甘特条）进度计算 ── */
it.ganttBars.forEach(b=>{
/* 1. 根据日期自动推导状态 */
if(b.start&&b.end){
if(b.end<=today){b.status='c'}
else if(b.start<=today&&b.end>today){b.status='i'}
else{b.status='p'}
}
/* 2. 三级模块完成度：
   - 已完成(c)：100%
   - 未启动(p)：0%
   - 进行中(i)：已过天数 / 总天数 × 100%  */
if(b.status==='c'){b._progress=100}
else if(b.status==='p'){b._progress=0}
else if(b.status==='i'&&b.start&&b.end){
const totalDays=_daysBetween(b.start,b.end);
const elapsed=_daysBetween(b.start,today);
b._progress=totalDays>0?Math.min(Math.round(elapsed/totalDays*100),99):0;
}else{b._progress=0}
/* 收集该子项的时间区间 */
if(b.start&&(!minStart||b.start<minStart))minStart=b.start;
if(b.end&&(!maxEnd||b.end>maxEnd))maxEnd=b.end;
});
/* ── 二级模块日期范围 ── */
if(minStart&&maxEnd){
const s=minStart.slice(5).replace('-','.');
const e=maxEnd.slice(5).replace('-','.');
it.dateRange=s+' - '+e;
}
/* ── 二级模块完成度 = 下属三级模块完成度之和 / 三级模块个数 ── */
if(it.ganttBars.length>0){
const sum=it.ganttBars.reduce((a,b)=>a+(b._progress||0),0);
it.progress=Math.round(sum/it.ganttBars.length);
it.progressColor=it.progress>=100?'gn':it.progress>0?'bl':'pu';
}
});
/* ── 一级模块完成率 = 下属二级模块完成度之和 / 二级模块个数 ── */
let mMinStart=null,mMaxEnd=null;
const itemsWithBars=m.items.filter(it=>it.ganttBars&&it.ganttBars.length>0);
if(itemsWithBars.length>0){
const sumProgress=itemsWithBars.reduce((a,it)=>a+(it.progress||0),0);
m.overallProgress=Math.round(sumProgress/itemsWithBars.length);
}
/* 模块时间区间和状态自动推导 */
m.items.forEach(it=>{
if(!it.ganttBars||!it.ganttBars.length)return;
it.ganttBars.forEach(b=>{
if(b.start&&(!mMinStart||b.start<mMinStart))mMinStart=b.start;
if(b.end&&(!mMaxEnd||b.end>mMaxEnd))mMaxEnd=b.end;
});
});
if(mMinStart&&mMaxEnd){
if(mMaxEnd<=today){m.status='completed'}
else if(mMinStart<=today&&mMaxEnd>today){m.status='inprogress'}
else{m.status='planned'}
}
});
/* ── 里程碑状态自动根据日期计算 ── */
if(D.milestones){D.milestones.forEach(ms=>{
if(ms.date){
if(ms.date<=today){ms.status='c'}
else{ms.status='p'}
}
});}
}

/* ===== HELPERS ===== */
/* 甘特图折叠：_ganttFoldIdx=N 表示前 N 个月被折叠；_ganttAllMonths 存储完整月份列表 */
let _ganttFoldIdx=0,_ganttAllMonths=[];
/* 动态计算甘特图日期范围 */
let GS=new Date('2026-01-01'),GE=new Date('2026-04-30'),GT_=(GE-GS)/864e5;
function _calcGanttRange(){
let minD=null,maxD=null;
D.modules.forEach(m=>{m.items.forEach(it=>{if(!it.ganttBars)return;it.ganttBars.forEach(b=>{
if(b.start&&(!minD||b.start<minD))minD=b.start;
if(b.end&&(!maxD||b.end>maxD))maxD=b.end;
});});});
if(!minD)minD='2026-01-01';
if(!maxD)maxD='2026-04-30';
/* 完整范围 */
const sd=new Date(minD);const _fullGS=new Date(sd.getFullYear(),sd.getMonth(),1);
const ed=new Date(maxD);GE=new Date(ed.getFullYear(),ed.getMonth()+1,0);
const minEnd=new Date(_fullGS.getFullYear(),_fullGS.getMonth()+3,0);
if(GE<minEnd)GE=minEnd;
/* 构建完整月份列表 */
_ganttAllMonths=[];let cur=new Date(_fullGS);
while(cur<=GE){_ganttAllMonths.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1)}
/* 折叠后调整 GS：跳过前 _ganttFoldIdx 个月 */
if(_ganttFoldIdx>0&&_ganttFoldIdx<_ganttAllMonths.length){GS=new Date(_ganttAllMonths[_ganttFoldIdx])}else{GS=_fullGS;_ganttFoldIdx=0}
GT_=(GE-GS)/864e5;
}
function gp(s,e,minPct){const a=(new Date(s)-GS)/864e5,b=(new Date(e)-GS)/864e5;let lPct=a/GT_*100;let wp=(b-a)/GT_*100;if(minPct&&wp<minPct)wp=minPct;/* 折叠裁剪：起始在可见范围之前 */if(lPct<0){wp+=lPct;lPct=0}/* 结束在可见范围之前则完全隐藏 */if(b<0)return{l:'-999%',w:'0%'};return{l:lPct.toFixed(2)+'%',w:(Math.max(wp,0.8)).toFixed(2)+'%'}}
/* 根据甘特条标题和日期文字估算最小显示宽度(百分比) */
function _calcMinPct(title,startStr,endStr){
/* 标题中文约13px/字，日期约11px×(M/D-M/D≈7-9字符) */
const titleW=(title||'').length*14+24;/* 标题像素宽 + padding */
const dateW=((fds(startStr)||'').length+(fds(endStr)||'').length+1)*7+24;
const needW=Math.max(titleW,dateW);
/* .gbs容器实际宽度约 1100-280=820px(桌面端) */
const gbsW=820;
return Math.max(needW/gbsW*100,3);/* 至少3% */
}
/* 生成动态月份头和周标签 HTML */
function _buildGanttHeader(){
_calcGanttRange();
/* 可见月份 = 折叠后的剩余月份 */
const visMonths=_ganttAllMonths.slice(_ganttFoldIdx);
let mh='<div class="gth-pad"></div>';
visMonths.forEach((mo,idx)=>{
const globalIdx=_ganttFoldIdx+idx;
const label=(mo.getMonth()+1)+'月';
/* 只有非首个可见月份才能折叠（折叠=隐藏该月之前的所有月份） */
const foldBtn=globalIdx>0?`<span class="gm-fold-btn" data-fold-idx="${globalIdx}" onclick="event.stopPropagation();foldGantt(${globalIdx})" title="折叠${label}之前的月份">◀ 折叠</span>`:'';
mh+=`<div class="gm" data-month-idx="${globalIdx}">${label}${foldBtn}</div>`;
});
let wh='<div class="gwm-pad"></div>';visMonths.forEach(mo=>{
const y=mo.getFullYear(),m=mo.getMonth();
const lastDay=new Date(y,m+1,0).getDate();
const weeks=Math.ceil(lastDay/7);
wh+='<div class="gwg">';
for(let w=1;w<=weeks;w++)wh+=`<span class="gwl">W${w}</span>`;
wh+='</div>';});
const startM=visMonths[0],endM=visMonths[visMonths.length-1];
const sy=startM.getFullYear(),ey=endM.getFullYear();
const rangeLabel=sy===ey?`${sy}年${startM.getMonth()+1}月 — ${endM.getMonth()+1}月`:`${sy}年${startM.getMonth()+1}月 — ${ey}年${endM.getMonth()+1}月`;
return{monthsHtml:mh,weeksHtml:wh,rangeLabel:rangeLabel};
}

function fds(d){const t=new Date(d);return(t.getMonth()+1)+'/'+t.getDate()}
function fdf(d){if(!d)return'';const t=new Date(d);return t.getFullYear()+'年'+(t.getMonth()+1)+'月'+t.getDate()+'日'}
/* 获取北京时间 ISO 字符串（含时间），格式: YYYY-MM-DDTHH:mm */
function getBJNow(){const n=new Date(),u=n.getTime()+n.getTimezoneOffset()*60000,b=new Date(u+8*3600000);return b.getFullYear()+'-'+String(b.getMonth()+1).padStart(2,'0')+'-'+String(b.getDate()).padStart(2,'0')+'T'+String(b.getHours()).padStart(2,'0')+':'+String(b.getMinutes()).padStart(2,'0')}
/* 格式化更新日期（含时间），显示为: YYYY年M月D日 HH:mm */
function fdfUpdate(d){if(!d)return'';const t=new Date(d);if(isNaN(t))return d;const y=t.getFullYear(),mo=t.getMonth()+1,da=t.getDate();const h=t.getHours(),mi=t.getMinutes();if(d.indexOf('T')>-1||d.indexOf(' ')>4){return y+'年'+mo+'月'+da+'日 '+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')}return y+'年'+mo+'月'+da+'日'}
function fdfull(d){if(!d)return'';const t=new Date(d);return t.getFullYear()+'.'+String(t.getMonth()+1).padStart(2,'0')+'.'+String(t.getDate()).padStart(2,'0')}

function initCardArrowAnimation(){
const cards=document.querySelectorAll('.sc.card-reveal');
const arrows=document.querySelectorAll('.timeline-arrow');
if(!cards.length)return;
const grid=document.getElementById('moduleGrid');
if(!grid)return;
const gridObs=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting){gridObs.disconnect();runCardSequence(cards,arrows)}})},{threshold:.2});
gridObs.observe(grid)}

function runCardSequence(cards,arrows){
const totalCards=cards.length;let step=0;
function nextStep(){
if(step<totalCards){
/* Reveal card with enhanced scale entrance */
const card=cards[step];card.classList.add('card-revealed');
/* Animate arrow to next card (arrow appears after card) */
if(step>0 && arrows[step-1]){animateArrow(arrows[step-1],cards[step-1],cards[step])}
step++;setTimeout(nextStep,1500)}
else if(step===totalCards&&arrows.length>0){/* last arrow already handled */}}
/* Start: first reveal + first arrow simultaneously */
nextStep()}

function animateArrow(arrowEl,fromCard,toCard){
const line=arrowEl.querySelector('.timeline-arrow-line');
const head=arrowEl.querySelector('.timeline-arrow-head');
const fromRect=fromCard.getBoundingClientRect();const toRect=toCard.getBoundingClientRect();const mainRect=document.getElementById('main').getBoundingClientRect();
/* Arrow strictly between cards - starts at right edge of from-card, ends at left edge of to-card */
const gapPad=6;/* tiny inset so arrow doesn't touch card borders */
const startX=fromRect.right-mainRect.left+gapPad;const endX=toRect.left-mainRect.left-gapPad;
const midY=fromRect.top+fromRect.height/2-mainRect.top;
const w=Math.max(endX-startX,0);
arrowEl.style.position='absolute';arrowEl.style.top=midY+'px';arrowEl.style.left=startX+'px';arrowEl.style.width=w+'px';arrowEl.style.height='48px';
/* Animate line drawing - extended to 1.2s */
line.style.width='0';line.style.height='100%';
requestAnimationFrame(()=>{requestAnimationFrame(()=>{line.style.transition='width 1.2s cubic-bezier(.25,.46,.45,.94)';line.style.width=w+'px'})});
/* Show arrowhead after line finishes */
head.style.left=(w-10)+'px';
setTimeout(()=>{head.style.opacity='1';head.style.transition='opacity .4s'},1100)}

function initMilestoneAnimation(){
const nodes=document.querySelectorAll('.ms-node');
if(!nodes.length)return;
const msObs=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting){const el=entry.target;const idx=parseInt(el.dataset.msIdx)||0;el.style.animationDelay=(idx*0.15)+'s';el.classList.add('ms-visible');msObs.unobserve(el)}})},{threshold:.1});
nodes.forEach(n=>msObs.observe(n));
/* Dynamically set path dasharray/dashoffset based on actual path length */
const pathLine=document.querySelector('.ms-path-line');
if(pathLine){
requestAnimationFrame(()=>{
const realLen=pathLine.getTotalLength?pathLine.getTotalLength():10000;
const len=Math.ceil(realLen)+100;/* Add buffer */
pathLine.style.strokeDasharray=len;
pathLine.style.strokeDashoffset=len;
/* Reset animation to use correct length */
pathLine.style.animation='none';
pathLine.offsetHeight;/* force reflow */
pathLine.style.animation=`msPathDraw 3s cubic-bezier(.4,0,.2,1) .5s forwards`;
/* Ensure path stays visible after animation ends */
pathLine.addEventListener('animationend',function(){
pathLine.style.strokeDasharray='none';
pathLine.style.strokeDashoffset='0';
pathLine.style.opacity='0.6';
},{once:true})

/* Generate mobile vertical S-curve if on narrow screen */

pathD+=` C${p.x+off} ${midY},${c.x-off} ${midY},${c.x} ${c.y}`}}

grad.id='msMobileGrad';grad.setAttribute('x1','0%');grad.setAttribute('y1','0%');

['#00C48C','#0066CC','#6C5CE7','#FF8C00'].forEach((c,i)=>{
const s=document.createElementNS(svgNS,'stop');

defs.appendChild(grad);svg.appendChild(defs);

/* Animate path drawing */

path.style.strokeDasharray=pathLen;path.style.strokeDashoffset=pathLen;
path.style.animation=`msPathDraw 2s cubic-bezier(.4,0,.2,1) .5s forwards`;
/* Keep path visible after animation */
path.addEventListener('animationend',function(){
path.style.strokeDasharray='none';path.style.strokeDashoffset='0';path.style.opacity='0.5';},{once:true});
svg.appendChild(path);
/* Add small arrow markers between nodes */
for(let i=0;i<nodePositions.length-1;i++){
const p0=nodePositions[i],p1=nodePositions[i+1];
const mx=(p0.x+p1.x)/2,my=(p0.y+p1.y)/2;
const dx=p1.x-p0.x,dy=p1.y-p0.y;
const ang=Math.atan2(dy,dx)*180/Math.PI;
const g=document.createElementNS(svgNS,'g');
g.setAttribute('transform',`translate(${mx},${my}) rotate(${ang})`);
g.style.opacity='0';g.style.animation=`msArrowIn .5s ease ${(0.5+i*0.3).toFixed(1)}s forwards`;
const arrow=document.createElementNS(svgNS,'path');
arrow.setAttribute('d','M-6,-4 L2,0 L-6,4');
arrow.setAttribute('fill','none');arrow.setAttribute('stroke','rgba(0,163,224,.5)');
arrow.setAttribute('stroke-width','2');arrow.setAttribute('stroke-linecap','round');
arrow.setAttribute('stroke-linejoin','round');
g.appendChild(arrow);svg.appendChild(g)}
container.appendChild(svg)})}

/* ===== 从模块数据同步里程碑 ===== */
function syncMsFromModules(){
if(!confirm('将从「模块编辑」和「基础信息」中提取关键节点，\n生成里程碑并替换现有内容。\n\n确定同步？'))return;
const today=new Date().toISOString().slice(0,10);
const ms=[];
/* 遍历每个模块 */
D.modules.forEach(m=>{
const catLabel=m.title;
/* 模块级：第一个甘特条的开始日期 = 模块启动里程碑 */
let mStart=null,mEnd=null;
m.items.forEach(it=>{
if(!it.ganttBars||!it.ganttBars.length)return;
/* 子项目级别的最早开始和最晚结束 */
let itStart=null,itEnd=null;
const barNames=[];
it.ganttBars.forEach(b=>{
if(b.start&&(!itStart||b.start<itStart))itStart=b.start;
if(b.end&&(!itEnd||b.end>itEnd))itEnd=b.end;
if(b.title)barNames.push(b.title);
});
if(!mStart||itStart<mStart)mStart=itStart;
if(!mEnd||itEnd>mEnd)mEnd=itEnd;
/* 子项目完成里程碑 = 最晚甘特条结束日期 */
if(itEnd){
const st=itEnd<=today?'c':'p';
const pct=it.progress!==undefined?it.progress:0;
const pctTxt=pct>=100?'（已完成）':pct>0?`（进度${pct}%）`:'（规划中）';
ms.push({
date:itEnd,
title:it.title+'完成',
desc:`[${catLabel}${m.title!==catLabel?'/'+m.title:''}] ${barNames.join('→')} ${pctTxt}`,
status:st
});
}
});
/* 模块启动里程碑 */
if(mStart){
ms.push({
date:mStart,
title:catLabel+'启动',
desc:`${m.title} — 首个任务开始`,
status:mStart<=today?'c':'p'
});
}
});
/* 综合基础信息：如果有负责人信息，附加到首尾里程碑描述 */
const pInfo=[];
if(D.project.reporter)pInfo.push('PM:'+D.project.reporter);
if(D.project.animLead)pInfo.push('动画:'+D.project.animLead);
if(D.project.po)pInfo.push('PO:'+D.project.po);
if(D.project.tl)pInfo.push('TL:'+D.project.tl);
const teamStr=pInfo.length?'（'+pInfo.join(' / ')+')':'';
/* 按日期排序 */
ms.sort((a,b)=>a.date.localeCompare(b.date));
/* 去重：同一天+相同标题的合并 */
const seen=new Set();const deduped=[];
ms.forEach(m=>{const k=m.date+'|'+m.title;if(!seen.has(k)){seen.add(k);deduped.push(m)}});
/* 第一个里程碑补充团队信息 */
if(deduped.length&&teamStr){deduped[0].desc+='\n'+teamStr}
D.milestones=deduped;
rMilestonesCfg();
showToast('已从模块数据同步 '+deduped.length+' 个里程碑');
}

function approveReq(idx){
const pendingReqs=AR.filter(r=>r.status==='pending');
if(idx>=pendingReqs.length)return;
const req=pendingReqs[idx];
const roleSelect=document.getElementById('approveRole_'+idx);
const role=roleSelect?roleSelect.value:req.requestedRole;
/* Add user to authorized list */
AU.users[req.name]={role:role,added:getBJDate()};
sAuth();
/* Update request status */
const origIdx=AR.findIndex(r=>r===req);
if(origIdx>-1){AR[origIdx].status='approved';AR[origIdx].approvedRole=role;AR[origIdx].processedDate=getBJDate()}
sReq();rPerm();showToast('已通过 '+req.name+' 的权限申请，授予'+RL[role].l);
}
function rejectReq(idx){
const pendingReqs=AR.filter(r=>r.status==='pending');
if(idx>=pendingReqs.length)return;
const req=pendingReqs[idx];
const reason=prompt('请输入拒绝原因（可选）：');
const origIdx=AR.findIndex(r=>r===req);
if(origIdx>-1){AR[origIdx].status='rejected';AR[origIdx].rejectReason=reason||'审批人未通过';AR[origIdx].processedDate=getBJDate()}
sReq();rPerm();showToast('已拒绝 '+req.name+' 的权限申请');
}

function parseContactInput(raw){const re=/^([a-zA-Z][\w]*?)(?:\((.+?)\)|\（(.+?)\）)?$/;const m=raw.match(re);if(m)return{engName:m[1].toLowerCase(),cnName:m[2]||m[3]||''};if(/^[a-zA-Z][\w]*$/.test(raw))return{engName:raw.toLowerCase(),cnName:''};return null}
function filterWxContacts(q){q=q.trim();if(!q){renderWxContacts([],true);return}const tokens=q.split(/[,;，；\s]+/).filter(Boolean);const parsed=tokens.map(parseContactInput).filter(Boolean);const seen=new Set();const unique=parsed.filter(p=>{if(seen.has(p.engName))return false;seen.add(p.engName);return true});if(!unique.length){renderWxContacts([],true);return}const results=[];let pending=unique.length;unique.forEach(p=>{sha256(p.engName).then(hash=>{const found=WX_CONTACTS_HASH.find(c=>c._h===hash);if(found){const info=decryptUser(found,p.engName);if(info){const displayName=p.cnName?p.cnName:info.name;results.push({wxId:info.wxId||p.engName,name:displayName,dept:info.dept,type:info.type||'fulltime',typeName:info.typeName||'员工',avatar:info.avatar||'#0066CC'})}}pending--;if(pending<=0)renderWxContacts(results,false,unique.length,results.length)})})}
function renderWxContacts(contacts,isInit,totalQ,matchedQ){const ct=document.getElementById('wxContactList');const depts={};contacts.forEach(c=>{const parts=c.dept.split('/');const topDept=parts.length>=4?parts.slice(2).join('/'):parts.slice(0,2).join('/');if(!depts[topDept])depts[topDept]=[];depts[topDept].push(c)});
let h='';if(!contacts.length){if(isInit){h='<div style="text-align:center;padding:40px;color:var(--txt3);line-height:1.8"><div style="font-size:28px;margin-bottom:8px">💼</div><div style="font-size:14px;font-weight:700;margin-bottom:4px">输入企业微信英文名(中文名)搜索</div><div style="font-size:12px">支持批量添加，用逗号或空格分隔<br>例如：rambokou(寇启龙), wasabiwang(王晓娇)<br>也可以只输入英文名：rambokou, wasabiwang</div></div>'}else{h='<div style="text-align:center;padding:40px;color:var(--txt3);line-height:1.8"><div style="font-size:28px;margin-bottom:8px">😕</div><div style="font-size:14px;font-weight:700">未找到匹配的联系人</div><div style="font-size:12px;margin-top:4px">请确认格式：英文名(中文名) 或 英文名<br>例如：rambokou(寇启龙) 或 rambokou</div></div>'}ct.innerHTML=h;return}
if(totalQ&&totalQ>1){h+='<div style="padding:8px 24px;font-size:12px;color:var(--txt3)">共搜索 '+totalQ+' 个英文名，匹配到 '+matchedQ+' 人</div>'}
Object.entries(depts).forEach(([dept,members])=>{h+=`<div class="wxwork-dept"><div class="wxwork-dept-header expanded" onclick="this.classList.toggle('expanded');this.nextElementSibling.classList.toggle('hidden')"><span class="dept-icon">▶</span> ${dept} <span style="color:var(--txt3)">(${members.length}人)</span></div><div>`;
members.forEach(c=>{const uid=c.wxId||c.name;const isSel=wxSelectedNames.includes(uid);const isExist=AU.users[uid]||AU.users[c.name];
const oc=isExist?'':'toggleWxContact(this,&apos;'+uid+'&apos;)';
const ex=isExist?' style="opacity:.4;cursor:not-allowed"':'';
const added=isExist?' <span style="font-size:10px;color:var(--txt3)">(已添加)<\/span>':'';
h+='<div class="wxwork-contact'+(isSel?' selected':'')+(isExist?' disabled':'')+'" onclick="'+oc+'"'+ex+'>';
h+='<div class="wx-check">'+(isSel?'✓':'')+'</div>';
h+='<div class="wx-avatar" style="background:'+c.avatar+'">'+c.name[0]+'</div>';
h+='<div class="wx-info"><div class="wx-name">'+uid+'('+c.name+')'+added+'</div><div class="wx-dept">'+c.dept+'</div></div>';
h+='<span class="wx-type '+c.type+'">'+c.typeName+'</span>';
h+='</div>';});h+='</div></div>'});ct.innerHTML=h}
function toggleWxContact(el,name){const idx=wxSelectedNames.indexOf(name);if(idx>-1){wxSelectedNames.splice(idx,1);el.classList.remove('selected');el.querySelector('.wx-check').textContent=''}else{wxSelectedNames.push(name);el.classList.add('selected');el.querySelector('.wx-check').textContent='✓'}updateWxFooter()}

/* ===== 版本管理：数据快照与变更检测 ===== */
let _prevSnapshot=null;
function _takeSnapshot(){
return JSON.parse(JSON.stringify({project:D.project,modules:D.modules,milestones:D.milestones}));
}
function _detectChanges(prev,cur){
if(!prev)return[];
const changes=[];const now=getBJNow();const user=AU.cur||'unknown';
/* 检测项目基础信息变更 */
['reporter','animLead','po','tl'].forEach(f=>{
const labels={reporter:'PM 负责',animLead:'动画负责人',po:'PO',tl:'TL'};
if(prev.project[f]!==cur.project[f]){
changes.push({time:now,user:user,type:'edit',scope:'基础信息',detail:`${labels[f]}：${prev.project[f]||'(空)'} → ${cur.project[f]||'(空)'}`});
}});
/* 检测模块结构变更 */
const prevMids=new Set(prev.modules.map(m=>m.id));
const curMids=new Set(cur.modules.map(m=>m.id));
cur.modules.forEach(m=>{if(!prevMids.has(m.id)){changes.push({time:now,user:user,type:'add',scope:'模块',detail:`新增一级模块「${m.title}」`})}});
prev.modules.forEach(m=>{if(!curMids.has(m.id)){changes.push({time:now,user:user,type:'del',scope:'模块',detail:`删除一级模块「${m.title}」`})}});
/* 检测模块内容变更 */
cur.modules.forEach(cm=>{
const pm=prev.modules.find(x=>x.id===cm.id);if(!pm)return;
if(pm.title!==cm.title)changes.push({time:now,user:user,type:'edit',scope:cm.title,detail:`模块标题：${pm.title} → ${cm.title}`});
if(pm.subtitle!==cm.subtitle)changes.push({time:now,user:user,type:'edit',scope:cm.title,detail:`副标题：${pm.subtitle||'(空)'} → ${cm.subtitle||'(空)'}`});
/* 检测子项目增删 */
const prevIids=new Set(pm.items.map(i=>i.id));
const curIids=new Set(cm.items.map(i=>i.id));
cm.items.forEach(ci=>{if(!prevIids.has(ci.id)){changes.push({time:now,user:user,type:'add',scope:cm.title,detail:`新增子项目「${ci.title}」`})}});
pm.items.forEach(pi=>{if(!curIids.has(pi.id)){changes.push({time:now,user:user,type:'del',scope:cm.title,detail:`删除子项目「${pi.title}」`})}});
/* 检测子项目甘特条变更 */
cm.items.forEach(ci=>{
const pi=pm.items.find(x=>x.id===ci.id);if(!pi)return;
if(pi.title!==ci.title)changes.push({time:now,user:user,type:'edit',scope:cm.title+'/'+ci.title,detail:`子项目标题：${pi.title} → ${ci.title}`});
if(!pi.ganttBars||!ci.ganttBars)return;
const maxLen=Math.max(pi.ganttBars.length,ci.ganttBars.length);
for(let bi=0;bi<maxLen;bi++){
const pb=pi.ganttBars[bi],cb=ci.ganttBars[bi];
if(!pb&&cb){changes.push({time:now,user:user,type:'add',scope:cm.title+'/'+ci.title,detail:`新增甘特条「${cb.title}」`});continue}
if(pb&&!cb){changes.push({time:now,user:user,type:'del',scope:cm.title+'/'+ci.title,detail:`删除甘特条「${pb.title}」`});continue}
if(pb&&cb){
if(pb.title!==cb.title)changes.push({time:now,user:user,type:'edit',scope:cm.title+'/'+ci.title,detail:`甘特条标题：${pb.title} → ${cb.title}`});
if(pb.start!==cb.start)changes.push({time:now,user:user,type:'edit',scope:cm.title+'/'+ci.title,detail:`「${cb.title}」开始日期：${pb.start||'(空)'} → ${cb.start||'(空)'}`});
if(pb.end!==cb.end)changes.push({time:now,user:user,type:'edit',scope:cm.title+'/'+ci.title,detail:`「${cb.title}」结束日期：${pb.end||'(空)'} → ${cb.end||'(空)'}`});
}}});});
/* 检测里程碑变更 */
if(prev.milestones&&cur.milestones){
const maxMs=Math.max(prev.milestones.length,cur.milestones.length);
for(let i=0;i<maxMs;i++){
const pm=prev.milestones[i],cm=cur.milestones[i];
if(!pm&&cm){changes.push({time:now,user:user,type:'add',scope:'里程碑',detail:`新增里程碑「${cm.title}」(${cm.date})`});continue}
if(pm&&!cm){changes.push({time:now,user:user,type:'del',scope:'里程碑',detail:`删除里程碑「${pm.title}」`});continue}
if(pm&&cm){
if(pm.title!==cm.title)changes.push({time:now,user:user,type:'edit',scope:'里程碑',detail:`标题：${pm.title} → ${cm.title}`});
if(pm.date!==cm.date)changes.push({time:now,user:user,type:'edit',scope:'里程碑',detail:`「${cm.title}」日期：${pm.date} → ${cm.date}`});
if(pm.desc!==cm.desc)changes.push({time:now,user:user,type:'edit',scope:'里程碑',detail:`「${cm.title}」描述更新`});
}}}
return changes;
}
/* 删除数据历史条目 */

/* ===== 版本管理面板渲染 ===== */

}
if(isManager){

}
h+=`</div></div>`;
/* 摘要行 */

/* 详情（默认折叠） */
h+=`<div class="ver-data-detail" id="data-detail-${dateKey}" style="display:none;margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr)">`;
/* 按时间分批展示 */

/* ===== 子模块2：版本开发历史更新 ===== */
h+=`<div class="ver-sub${_verSubTab==='dev'?' act':''}" id="ver-sub-dev">`;
/* 当前版本号徽标（移到这里） */

h+='<div style="font-size:11px;color:var(--txt3);margin-bottom:14px;line-height:1.6;padding:10px 14px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid var(--bdr)">💡 版本开发历史由 AI 根据每次沟通记录自动生成，记录平台的核心功能更新与新增。</div>';
if(!D.devHistory||!D.devHistory.length){

}else{
/* 倒序展示版本 */
const devSorted=[...D.devHistory].reverse();
devSorted.forEach((v,idx)=>{
const realIdx=D.devHistory.length-1-idx;
const isMajor=v.type==='major';
const verColor=isMajor?'#C4B5FD':'var(--acc2)';

}
/* 切换日期详情展开/折叠 */

el.style.display=el.style.display==='none'?'block':'none';

/* 格式化日期为中文显示（YYYY-MM-DD → YYYY年MM月DD日） */
function _fmtDateCn(d){
if(!d||d.length<10)return d||'';
const parts=d.split('-');
if(parts.length!==3)return d;
return parts[0]+'年'+parseInt(parts[1])+'月'+parseInt(parts[2])+'日';
}
/* ===== Excel 导出：生成对应日期的全量业务数据 ===== */
function exportDataExcel(dateKey){
if(!isS()){showToast('仅超级管理员可导出业务数据',1);return}
if(typeof XLSX==='undefined'){showToast('Excel 库加载中，请稍后重试',1);return}

let snapshot=null;
if(D.dataSnapshots&&D.dataSnapshots[dateKey]){
snapshot=D.dataSnapshots[dateKey];
}else{
/* 使用当前数据作为快照 */
snapshot={project:D.project,modules:D.modules,milestones:D.milestones};
}
const wb=XLSX.utils.book_new();
/* Sheet 1: 项目概览 */

['项目概览','',''],
['字段','内容',''],
['项目名称',snapshot.project.name||'',''],

(snapshot.modules||[]).forEach(m=>{
const statusMap={completed:'已完成',inprogress:'进行中',pending:'待启动'};
modRows.push([m.title||'',m.subtitle||'',m.overallProgress||0,statusMap[m.status]||m.status||'',m.items?m.items.length:0,'']);

/* Sheet 3: 子项目与甘特条详情 */

const statusLabels={c:'已完成',i:'进行中',p:'待启动'};
(snapshot.modules||[]).forEach(m=>{
(m.items||[]).forEach(it=>{
if(!it.ganttBars||!it.ganttBars.length){
ganttRows.push([m.title||'',it.title||'',it.dateRange||'',it.progress||0,'—','—','—','—']);
}else{
it.ganttBars.forEach((bar,bi)=>{
ganttRows.push([
bi===0?(m.title||''):'',
bi===0?(it.title||''):'',
bi===0?(it.dateRange||''):'',
bi===0?(it.progress||0):'',
bar.title||'',
bar.start||'',
bar.end||'',
statusLabels[bar.status]||bar.status||''
]);
});
}
});
});
const wsGantt=XLSX.utils.aoa_to_sheet(ganttRows);

/* 删除某日期的数据历史 */
function delDataHistGroup(dateKey){if(!D.dataHistory)return;if(!confirm('确定删除 '+_fmtDateCn(dateKey)+' 的所有变更记录？'))return;D.dataHistory=D.dataHistory.filter(e=>(e.time||'').substring(0,10)!==dateKey);rVersion()}
function applyCfg(){/* 保存前校验：结束日期不得早于开始日期 */
let dateErr=false;document.querySelectorAll('.gantt-date-pair').forEach(pair=>{const inputs=pair.querySelectorAll('input[type="date"]');if(inputs.length!==2)return;const sv=inputs[0].value,ev=inputs[1].value;if(sv&&ev&&ev<sv){dateErr=true;inputs[1].style.outline='2px solid #ff4444';inputs[0].style.outline='2px solid #ff4444';setTimeout(()=>{inputs[0].style.outline='';inputs[1].style.outline=''},2000)}});if(dateErr){showToast('⚠️ 结束日期不能早于开始日期，请修正后再保存');return}
/* 保存时自动记录当前北京时间为更新日期 */D.project.updateDate=getBJNow();D.project.reporter=document.getElementById('cfgRep').value||'rambokou(寇启龙)';D.project.animLead=document.getElementById('cfgAnimLead').value||'';D.project.po=document.getElementById('cfgPO').value||'';D.project.tl=document.getElementById('cfgTL').value||'';document.querySelectorAll('.gdi').forEach(inp=>{const mid=inp.dataset.m,iid=inp.dataset.i,bi=+inp.dataset.b,f=inp.dataset.f,v=inp.value;if(!mid||!iid||!f)return;const m=D.modules.find(x=>x.id===mid);if(m){const it=m.items.find(x=>x.id===iid);if(it&&it.ganttBars[bi]){it.ganttBars[bi][f]=v}}});
/* ===== 版本管理：自动检测业务数据变更 ===== */
const curSnapshot=_takeSnapshot();
const changes=_detectChanges(_prevSnapshot,curSnapshot);
if(changes.length>0){
if(!D.dataHistory)D.dataHistory=[];
D.dataHistory.push(...changes);
/* 保存当日全量数据快照（用于超管导出Excel） */
if(!D.dataSnapshots)D.dataSnapshots={};
const todayKey=getBJNow().substring(0,10);
D.dataSnapshots[todayKey]=JSON.parse(JSON.stringify(curSnapshot));
/* 最多保留500条记录，超出则删除最早的 */
if(D.dataHistory.length>500)D.dataHistory=D.dataHistory.slice(-500);
/* 快照最多保留30天 */
const snapKeys=Object.keys(D.dataSnapshots).sort();
if(snapKeys.length>30){snapKeys.slice(0,snapKeys.length-30).forEach(k=>delete D.dataSnapshots[k])}
}
_prevSnapshot=_takeSnapshot();/* 更新快照为当前状态 */
saveAndSync('chore: 配置面板保存 ('+getBJNow()+')');render();toggleCfg()}
function resetCfg(){if(!isS()){showToast('仅超级管理员可执行此操作',1);return}if(!confirm('⚠️ 危险操作！\n\n「重置数据」将清除当前浏览器中保存的所有业务数据（模块、里程碑、权限等），恢复为系统默认值。\n\n确定要继续吗？'))return;if(!confirm('⚠️ 二次确认！\n\n此操作不可撤销！确定要重置所有数据？'))return;localStorage.removeItem('mocap_v5');localStorage.removeItem('mocap_auth_v2');localStorage.removeItem('mocap_access_req');localStorage.removeItem('mocap_ioa_id');location.reload()}
/* ===== GitHub Token 配置函数 ===== */
function cfgGHToken(){const inp=document.getElementById('ghTokenInput');if(!inp)return;let v=inp.value.trim();if(v.startsWith('••'))v='';/* 防止误保存掩码值 */
if(!v){showToast('请输入有效的 GitHub Token',1);return}
setGHToken(v);inp.value='••••••••'+v.slice(-4);showToast('✅ GitHub Token 已保存');_updateGHStatus()}
async function testGHToken(){const st=document.getElementById('ghSyncStatus');if(st)st.innerHTML='<span style="color:var(--txt3)">⏳ 正在测试连接...</span>';
const token=getGHToken();if(!token){if(st)st.innerHTML='<span style="color:#ff4444">❌ 未配置 Token</span>';return}
try{const resp=await fetch(`${GH_API}/repos/${GH_REPO}`,{headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}});
if(resp.ok){const data=await resp.json();if(st)st.innerHTML=`<span style="color:#00C48C">✅ 连接成功！仓库: ${data.full_name} · 可${data.permissions?.push?'读写':'只读'}</span>`;showToast('✅ GitHub 连接测试成功')}
else{const err=await resp.json().catch(()=>({}));if(st)st.innerHTML=`<span style="color:#ff4444">❌ 连接失败: ${err.message||resp.status}</span>`;showToast('GitHub 连接失败',1)}}
catch(e){if(st)st.innerHTML=`<span style="color:#ff4444">❌ 网络错误: ${e.message}</span>`}}
function _updateGHStatus(){const st=document.getElementById('ghSyncStatus');if(!st)return;const t=getGHToken();st.innerHTML=t?'<span style="color:#00C48C">🔗 Token 已配置（尾号 '+t.slice(-4)+'）· 数据将自动同步</span>':'<span style="color:var(--txt3)">⚠️ 未配置 Token · 数据仅保存在当前浏览器</span>'}
function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
render();
</script>
